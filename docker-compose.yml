version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/kado_db
      - REDIS_URL=redis://redis:6379
      # Dev-only placeholder secrets. NEVER use in production — A5 env validation
      # refuses to boot with placeholder/short secrets when NODE_ENV=production.
      - JWT_SECRET=dev-insecure-jwt-secret-change-me-0123456789abcd
      - JWT_REFRESH_SECRET=dev-insecure-refresh-secret-change-me-0123456789
      - TAP_SECRET_KEY=dev_placeholder_tap_key
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Apply ALL migrations through the runner (recorded in _migrations), then start.
    # The previous setup mounted only 001_initial_schema.sql into initdb, so a
    # `docker compose up` database was missing everything after 001.
    # Seed separately once it's up:  docker compose run --rm app npm run seed
    command: sh -c "npm run migrate:up && node src/index.js"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  db:
    # Match production (PostgreSQL 17.6). If you previously ran the pg14 volume,
    # recreate it first: docker compose down -v
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kado_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
