name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --no-coverage
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-backend
          JWT_REFRESH_SECRET: ci-test-refresh-secret

      - name: Run integration tests
        run: npm run test:integration -- --no-coverage
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-backend
          JWT_REFRESH_SECRET: ci-test-refresh-secret

      - name: Run security tests
        run: npm run test:security -- --no-coverage
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-backend
          JWT_REFRESH_SECRET: ci-test-refresh-secret
